[build]
  command = "npm install --prefix frontend --legacy-peer-deps && npm run build --prefix frontend"
  publish = "frontend/dist"

[functions]
  directory = "backend/dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main-netlify/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
